name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Exposed so the FTP step skips cleanly until the secrets are configured
    # (the build still runs, so a push before setup won't fail the workflow).
    env:
      FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Probe every project URL and refresh src/data/liveness.json before the
      # build, so unreachable projects ship in their "coming soon" state. This
      # never fails the build (the script always exits 0). SKIP_LINK_CHECK on
      # the build step stops the prebuild hook re-running the same probe.
      - name: Check project links
        run: npm run check-links

      - run: npm run build
        env:
          SKIP_LINK_CHECK: '1'

      - name: Deploy to Hostinger via FTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          # Vite build output.
          local-dir: ./dist/
          # Use a Hostinger FTP account SCOPED to rqai.co.uk's web root, so this
          # stays "./" and can never touch any other site. (The action mirrors
          # local-dir and deletes server files not present locally.)
          server-dir: ./
          # clinicalproms.rqai.co.uk and audioquill.rqai.co.uk are SEPARATE sites
          # (the ortho-outcomes marketing-site and the @audioquill/app PWA) whose
          # document roots ARE public_html/clinicalproms and public_html/audioquill.
          # rqai.co.uk's /clinicalproms/ and /audioquill/ hub pages render to
          # dist/<slug>/index.html and, without these excludes, overwrite each
          # site's homepage on every deploy (the shared-folder collision, 2026-07).
          # Excluded paths are left untouched on the server (not uploaded, not
          # deleted), so each app owns its folder and rqai.co.uk's /clinicalproms(/)
          # and /audioquill(/) 301-redirect to the subdomains (Hostinger redirects).
          # NB: the first three globs are the action's defaults, repeated here
          # because setting `exclude` overrides them.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/clinicalproms/**
            **/audioquill/**
          state-name: .ftp-deploy-sync-state-rqai.json
          timeout: 180000
